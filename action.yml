name: "MCP Verdict Check"
description: "Check MCP package trust verdicts before deploy. Returns allow, warn, or block for each dependency."
author: "AgentScore"

branding:
  icon: "shield"
  color: "blue"

inputs:
  packages:
    description: "Comma-separated list of npm package names to check. If empty, reads from package.json dependencies."
    required: false
    default: ""
  fail-on:
    description: "Fail the check if any package returns this verdict or worse. Options: warn, block. Default: block."
    required: false
    default: "block"
  api-url:
    description: "AgentScore API base URL."
    required: false
    default: "https://agentscores.xyz"
  api-key:
    description: "AgentScore API key for repo inventory tracking and central policy. Without this, verdict checks still work but repo inventory is not stored."
    required: false
    default: ""
  fail-open:
    description: "If true, pass the check when the AgentScore API is unreachable. Default: false (fail-closed)."
    required: false
    default: "false"

outputs:
  results:
    description: "JSON array of verdict results for each package."
  passed:
    description: "Whether all packages passed the check (true/false)."

runs:
  using: "node20"
  main: "index.js"
